services:
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ipc: host
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_ATTENTION_BACKEND=${VLLM_ATTENTION_BACKEND:-FLASHINFER}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    command:
      - --model=${MODEL:-Qwen/Qwen3.5-35B-A3B}
      - --port=8000
      - --tensor-parallel-size=${GPU_COUNT:-1}
      - --max-model-len=${MAX_MODEL_LEN:-65536}
      - --gpu-memory-utilization=${GPU_MEM_UTIL:-0.92}
      - --reasoning-parser=qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser=hermes
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yml:/app/config.yaml
    command:
      - --config=/app/config.yaml
      - --port=4000
    depends_on:
      vllm:
        condition: service_healthy
